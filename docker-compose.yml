services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    build: .
    command: sh -c "rm -f bootstrap/cache/*.php && mkdir -p storage/logs bootstrap/cache && chown -R www-data:www-data storage bootstrap/cache && php-fpm"
    environment:
      APP_NAME: "Notification Service"
      APP_ENV: local
      APP_KEY: "base64:0zXxgBtGm6pNUDEQ96cGJrTFlXKXvZsj6ZTgVPq44+o="
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notifications
      DB_USERNAME: notifications
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:19092
      KAFKA_CONSUMER_GROUP_ID: notification-service
      KAFKA_AUTO_COMMIT: "true"
      KAFKA_TOPIC_TRANSACTIONAL: notifications.transactional
      KAFKA_TOPIC_MARKETING: notifications.marketing
      NOTIFICATION_MAX_ATTEMPTS: 3
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy

  setup:
    build: .
    command: sh -c "rm -f bootstrap/cache/*.php && mkdir -p storage/logs bootstrap/cache && chown -R www-data:www-data storage bootstrap/cache && php artisan migrate --force && php artisan db:seed --force"
    environment:
      APP_ENV: local
      APP_KEY: "base64:0zXxgBtGm6pNUDEQ96cGJrTFlXKXvZsj6ZTgVPq44+o="
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notifications
      DB_USERNAME: notifications
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:19092
      KAFKA_AUTO_COMMIT: "true"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      app:
        condition: service_started

  consumer-transactional:
    build: .
    command: sh -c "rm -f bootstrap/cache/*.php && mkdir -p storage/logs bootstrap/cache && chown -R www-data:www-data storage bootstrap/cache && php artisan notifications:consume transactional"
    environment:
      APP_ENV: local
      APP_KEY: "base64:0zXxgBtGm6pNUDEQ96cGJrTFlXKXvZsj6ZTgVPq44+o="
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notifications
      DB_USERNAME: notifications
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:19092
      KAFKA_CONSUMER_GROUP_ID: notification-service-transactional
      KAFKA_AUTO_COMMIT: "true"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      setup:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  consumer-marketing:
    build: .
    command: sh -c "rm -f bootstrap/cache/*.php && mkdir -p storage/logs bootstrap/cache && chown -R www-data:www-data storage bootstrap/cache && php artisan notifications:consume marketing"
    environment:
      APP_ENV: local
      APP_KEY: "base64:0zXxgBtGm6pNUDEQ96cGJrTFlXKXvZsj6ZTgVPq44+o="
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notifications
      DB_USERNAME: notifications
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:19092
      KAFKA_CONSUMER_GROUP_ID: notification-service-marketing
      KAFKA_AUTO_COMMIT: "true"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      setup:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    ports:
      - "54320:5432"
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "63790:6379"

  kafka:
    image: apache/kafka:3.7.2
    hostname: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:19092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
  kafka-init:
    image: apache/kafka:3.7.2
    command: >
      sh -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic notifications.transactional --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic notifications.marketing --partitions 3 --replication-factor 1
      "
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
  vendor:
